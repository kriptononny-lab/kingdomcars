# =============================================================================
# Deploy — on push to main, builds the production Docker image, pushes it to
# GHCR, then SSHs into the host and rolls the app container. Implements §19.
#
# Required GitHub Secrets (configure in Settings → Secrets → Actions):
#   DEPLOY_HOST       — host or IP of the VPS
#   DEPLOY_USER       — SSH user with docker group membership
#   DEPLOY_SSH_KEY    — private key (matches a public key in ~/.ssh/authorized_keys)
#   DEPLOY_PATH       — absolute path to the project on the host, e.g. /opt/kingdomcars
#   SENTRY_AUTH_TOKEN — optional, uploads sourcemaps on release
#
# Required GitHub Environment:
#   production — with "Required reviewers" enabled so deploys can't auto-merge.
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false # never cancel an in-flight deploy

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for release notes / Sentry release

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # `latest` always points at main HEAD; sha-based tag is the
          # immutable reference the prod compose file pins to.
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache lives in GHA cache — first build is slow, subsequent
          # builds reuse npm-deps and next-build layers.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SKIP_ENV_VALIDATION=1
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_SITE_HOST=${{ vars.NEXT_PUBLIC_SITE_HOST }}
            PAYLOAD_SECRET=ci_image_build_mock_secret_at_least_32ch
            PAYLOAD_PUBLIC_SERVER_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            DATABASE_URL=postgres://mock:mock@localhost:5432/mock_build_db
            REVALIDATE_SECRET=ci_image_build_mock_revalidate_16ch
            TELEGRAM_BOT_TOKEN=0:ci_image_build_mock
            TELEGRAM_CHAT_ID=-1
            # These are MOCKS used only to satisfy Payload's init check during
            # `next build` page-data collection inside the image. They are NOT
            # baked into runtime — the prod container reads real values from
            # `.env.production` mounted at runtime via docker-compose. If a real
            # build accidentally pinned these as defaults, the prod start would
            # fail with the same secret check, surfacing the misconfiguration.

  deploy:
    name: SSH deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    # Gates the deploy on the `production` environment's required reviewers.
    environment:
      name: production
      url: https://${{ vars.NEXT_PUBLIC_SITE_HOST }}
    steps:
      - name: SSH and roll the app container
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # `--no-deps app` keeps postgres + caddy running while only the app
          # container is recreated. Expect ~10s of 502 during recreate.
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps app
            docker image prune -f --filter "until=168h"
