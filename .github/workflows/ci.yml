# =============================================================================
# CI — runs on every PR and on pushes to main. Implements §19 / §15 / §11.
#
# Jobs run in parallel where possible. Each job restores the same npm cache
# (keyed off package-lock.json) so cold starts are minimised. The "build" job
# uses SKIP_ENV_VALIDATION=1 so we don't need to expose real secrets to PRs.
#
# Build, E2E and Lighthouse set STUB_SERVER_ONLY=1 so the postinstall script
# (see scripts/patch-payload.mjs) replaces `node_modules/server-only/index.js`
# with a no-op. The real `server-only` package throws when loaded outside an
# RSC compiler, which crashes the tsx-driven CLI scripts (migrate, seed) that
# we need at build time. Production deploys never set this env, so the real
# package — and the bundler's client/server boundary check it enforces — is
# preserved. See docs/adr/0006-server-only.md for the full rationale.
#
# Lighthouse is informational (continue-on-error). The thresholds in
# .lighthouserc.json are aspirational quality gates (a11y=1.0, seo=1.0)
# that target feature-complete state. Several known content/a11y bugs are
# tracked in STEP_12_KNOWN_ISSUES.md and won't pass until the cleanup
# patch lands. Flipping LHCI back to a hard gate is the last step of that
# cleanup ticket.
# =============================================================================

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  install:
    name: Install (cached)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --no-audit --no-fund
        env:
          # postinstall is `node scripts/patch-payload.mjs` — safe to run with no env.
          HUSKY: '0'

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck

  test:
    name: Unit tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run test:cov
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: payload
          POSTGRES_PASSWORD: ci_build_password
          POSTGRES_DB: kingdomcars_build
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U payload -d kingdomcars_build"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      STUB_SERVER_ONLY: '1'
      SKIP_ENV_VALIDATION: '1'
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_HOST: localhost
      DATABASE_URL: postgres://payload:ci_build_password@localhost:5432/kingdomcars_build
      PAYLOAD_SECRET: ci_build_mock_secret_at_least_thirty_two_chars
      PAYLOAD_PUBLIC_SERVER_URL: http://localhost:3000
      REVALIDATE_SECRET: ci_build_mock_revalidate_secret_16ch
      TELEGRAM_BOT_TOKEN: '0:ci_build_mock'
      TELEGRAM_CHAT_ID: '-1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Apply Payload migrations
        run: npm run payload:migrate
      - run: npm run build
      - name: Bundle size report
        run: npx bundlewatch --config bundlewatch.config.json || true
        env:
          BUNDLEWATCH_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    name: E2E (Playwright)
    needs: install
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: payload
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: kingdomcars_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U payload -d kingdomcars_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      STUB_SERVER_ONLY: '1'
      DATABASE_URL: postgres://payload:ci_test_password@localhost:5432/kingdomcars_test
      PAYLOAD_SECRET: ci_test_secret_at_least_thirty_two_chars_xx
      PAYLOAD_PUBLIC_SERVER_URL: http://localhost:3000
      REVALIDATE_SECRET: ci_test_revalidate_secret_16ch
      TELEGRAM_BOT_TOKEN: '0:ci_test_token_for_mock_server'
      TELEGRAM_CHAT_ID: '-100000000000'
      TELEGRAM_API_BASE: http://localhost:9999
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_HOST: localhost
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Apply Payload migrations
        run: npm run payload:migrate
      - name: Seed test data
        run: npm run seed
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  audit:
    name: npm audit
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      # `--audit-level=high` fails on high/critical only — moderate/low are
      # surfaced via Dependabot PRs and don't gate CI.
      - run: npm audit --omit=dev --audit-level=high

  lighthouse:
    name: Lighthouse CI
    needs: build
    runs-on: ubuntu-latest
    # Don't block the merge on LHCI while STEP_12_KNOWN_ISSUES.md content/a11y
    # bugs are still in flight. Once those land and `.lighthouserc.json`
    # thresholds reflect actual achievable scores, remove this line.
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: payload
          POSTGRES_PASSWORD: ci_lhci_password
          POSTGRES_DB: kingdomcars_lhci
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U payload -d kingdomcars_lhci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      STUB_SERVER_ONLY: '1'
      SKIP_ENV_VALIDATION: '1'
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_HOST: localhost
      PAYLOAD_SECRET: ci_lhci_secret_at_least_thirty_two_chars_xx
      PAYLOAD_PUBLIC_SERVER_URL: http://localhost:3000
      REVALIDATE_SECRET: ci_lhci_revalidate_secret_16ch
      DATABASE_URL: postgres://payload:ci_lhci_password@localhost:5432/kingdomcars_lhci
      TELEGRAM_BOT_TOKEN: '0:ci_lhci_mock'
      TELEGRAM_CHAT_ID: '-1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Apply Payload migrations
        run: npm run payload:migrate
      - name: Seed content
        # LHCI hits real Page URLs; without seed they 404 / have empty meta,
        # which tanks SEO and a11y scores artificially.
        run: npm run seed
      - run: npm run build
      - name: Run LHCI
        run: npx --yes @lhci/cli@0.14.x autorun --config=.lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
